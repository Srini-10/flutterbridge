# Spec v2.0 §8. The generated library is held to the same standard as hand-written code: if the
# generator emits something the analyzer dislikes, the *generator* is fixed — never the output.
include: package:very_good_analysis/analysis_options.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

formatter:
  page_width: 100

linter:
  rules:
    lines_longer_than_80_chars: false
    omit_local_variable_types: false
    avoid_types_on_closure_parameters: false
