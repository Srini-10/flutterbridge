name: bridge_analyzer
description: >-
  FlutterBridge compiler frontend. Loads a Flutter project through package:analyzer, extracts
  resolved semantics, and emits UIR as NDJSON. It never generates target code.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.11.0

dependencies:
  # ADR-14: pinned EXACTLY, not with a caret. Extraction output is hashed into every cache key
  # (Spec §7.2), so a transitive minor bump must never be able to change it silently.
  analyzer: 14.0.0
  # The UIR models. Generated from the schema; never hand-written (Spec §2.5).
  bridge_uir:
    path: ../bridge_uir
  collection: ^1.19.1
  crypto: ^3.0.7
  meta: ^1.19.0
  path: ^1.9.1
  yaml: ^3.1.3

dev_dependencies:
  test: ^1.31.2
  # 10.3.0 requires Dart 3.12; our toolchain is pinned at 3.11.3 (M1 readiness checklist).
  very_good_analysis: ^10.2.0
